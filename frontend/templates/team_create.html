{{define "content"}}
{{template "nav" .}}
<div class="pt-24 pb-20 px-6 min-h-screen flex items-start justify-center">
  <div class="w-full max-w-lg">
    <div class="mb-10">
      <a href="/teams" class="inline-flex items-center gap-2 text-slate-500 hover:text-primary font-mono text-xs uppercase tracking-wider mb-6 no-underline transition-colors">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Teams
      </a>
      <h1 class="font-mono text-4xl font-bold tracking-tighter text-white uppercase">Create Team</h1>
      <div class="w-16 h-0.5 bg-primary mt-3"></div>
    </div>

    {{if .Error}}<div class="mb-6 p-4 border-l-4 border-primary bg-primary/10 text-primary font-mono text-sm">[!] {{.Error}}</div>{{end}}

    <div class="bg-card-dark border border-primary-dark p-8" style="box-shadow:0 0 20px rgba(255,31,31,0.08)">
      <form method="POST" action="/teams/create" class="space-y-6">
        <div class="flex flex-col gap-2">
          <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400">Team Name</label>
          <input name="name" type="text" placeholder="RedTeam Alpha" required class="w-full bg-bg-dark border border-primary-dark text-white px-4 py-4 focus:ring-1 focus:ring-primary focus:border-primary outline-none font-mono text-sm placeholder:text-slate-700 transition-colors"/>
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400">Description</label>
          <textarea name="description" rows="3" placeholder="Tell others about your team..." class="w-full bg-bg-dark border border-primary-dark text-white px-4 py-4 focus:ring-1 focus:ring-primary focus:border-primary outline-none font-mono text-sm placeholder:text-slate-700 resize-none transition-colors"></textarea>
        </div>
        <div class="flex flex-col gap-2">
          <label class="font-mono text-[10px] font-bold uppercase tracking-widest text-slate-400">Max Members</label>
          <input name="max_members" type="number" value="5" min="1" max="50" required class="w-full bg-bg-dark border border-primary-dark text-white px-4 py-4 focus:ring-1 focus:ring-primary focus:border-primary outline-none font-mono text-sm placeholder:text-slate-700 transition-colors"/>
        </div>
        <button type="submit" class="w-full flex items-center justify-center bg-primary h-14 font-mono font-bold text-black hover:bg-red-700 transition-colors uppercase tracking-widest" style="box-shadow:0 0 20px rgba(255,31,31,0.2)">
          CREATE TEAM
        </button>
      </form>
    </div>
  </div>
</div>
{{end}}
