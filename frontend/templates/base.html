{{define "base"}}<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ff1f1f",
              "primary-dark": "#7A0F12",
              "bg-dark": "#000000",
              "card-dark": "#0D0D0D",
              success: "#00ff88",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .scanline-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.02),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.02)
          );
        background-size:
          100% 4px,
          3px 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.15;
      }
      .active-nav {
        border-bottom: 2px solid #ff1f1f;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0d0d0d;
      }
      ::-webkit-scrollbar-thumb {
        background: #7a0f12;
      }
    </style>
  </head>
  <body
    class="bg-bg-dark font-display text-slate-100 min-h-screen selection:bg-primary selection:text-white"
  >
    <div class="scanline-overlay"></div>
    {{template "content" .}}
    <canvas
      id="matrix-canvas"
      style="
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        opacity: 0.03;
        z-index: 0;
      "
    ></canvas>
    <script>
      (function () {
        const c = document.getElementById("matrix-canvas"),
          ctx = c.getContext("2d");
        function sz() {
          c.width = innerWidth;
          c.height = innerHeight;
        }
        sz();
        addEventListener("resize", sz);
        const ch = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%><";
        const fs = 13;
        let dr = [];
        function init() {
          dr = Array(Math.floor(c.width / fs)).fill(1);
        }
        init();
        addEventListener("resize", init);
        setInterval(() => {
          ctx.fillStyle = "rgba(0,0,0,.05)";
          ctx.fillRect(0, 0, c.width, c.height);
          ctx.fillStyle = "#ff1f1f";
          ctx.font = fs + "px JetBrains Mono";
          dr.forEach((y, i) => {
            ctx.fillText(
              ch[Math.floor(Math.random() * ch.length)],
              i * fs,
              y * fs,
            );
            if (y * fs > c.height && Math.random() > 0.975) dr[i] = 0;
            dr[i]++;
          });
        }, 60);
      })();
    </script>
  </body>
</html>
{{end}} {{define "nav"}}
<header
  class="fixed top-0 left-0 right-0 h-16 bg-black border-b border-primary/40 z-50 flex items-center px-6"
>
  <!-- Logo - left -->
  <div class="flex items-center flex-shrink-0">
    <a href="/" class="flex items-center no-underline">
      <img
        src="/static/img/vishwactf_transbg.png"
        alt="VishwaCTF"
        style="height: 50px; width: auto"
      />
    </a>
  </div>

  <!-- Nav links - centered -->
  <nav
    class="hidden md:flex items-center gap-8 h-16 absolute left-1/2 -translate-x-1/2"
  >
    <a
      id="nav-home"
      href="/"
      class="text-slate-400 hover:text-white text-sm font-medium font-display uppercase tracking-wider transition-colors h-full flex items-center px-1 no-underline"
      >Home</a
    >
    <a
      id="nav-challenges"
      href="/challenges"
      class="text-slate-400 hover:text-white text-sm font-medium font-display uppercase tracking-wider transition-colors h-full flex items-center px-1 no-underline"
      >Challenges</a
    >
    <a
      id="nav-scoreboard"
      href="/scoreboard"
      class="text-slate-400 hover:text-white text-sm font-medium font-display uppercase tracking-wider transition-colors h-full flex items-center px-1 no-underline"
      >Scoreboard</a
    >
    <a
      id="nav-teams"
      href="/teams"
      class="text-slate-400 hover:text-white text-sm font-medium font-display uppercase tracking-wider transition-colors h-full flex items-center px-1 no-underline"
      >Teams</a
    >
  </nav>

  <!-- Auth - right -->
  <div class="flex items-center gap-4 ml-auto flex-shrink-0">
    {{if .Username}}
    <a
      href="/profile"
      class="text-slate-300 hover:text-primary font-mono text-sm transition-colors no-underline"
      >[ {{.Username}} ]</a
    >
    <a
      href="/logout"
      class="border border-primary-dark text-white hover:bg-primary-dark/30 font-bold font-mono text-xs px-4 py-2 uppercase tracking-wider transition-colors no-underline"
      >Logout</a
    >
    {{else}}
    <a
      href="/login"
      class="text-white hover:text-primary font-bold font-mono text-sm px-4 py-2 uppercase tracking-wider transition-colors no-underline"
      >Login</a
    >
    <a
      href="/register"
      class="bg-primary hover:bg-red-700 text-white font-bold font-mono text-sm px-6 py-2 uppercase tracking-wider transition-colors no-underline"
      >Register</a
    >
    {{end}}
  </div>
</header>
<script>
  (function () {
    const path = window.location.pathname;
    const map = {
      "nav-home": path === "/",
      "nav-challenges": path.startsWith("/challenges"),
      "nav-scoreboard": path.startsWith("/scoreboard"),
      "nav-teams": path.startsWith("/teams"),
    };
    Object.entries(map).forEach(([id, active]) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (active) {
        el.classList.remove("text-slate-400");
        el.classList.add("text-primary", "border-b-2", "border-primary");
      }
    });
  })();
</script>
{{end}}
